<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RHAI Beauty Salon - Sistema</title>
  <meta name="description" content="Sistema de agendamento do salão RHAI Beauty Salon">
  <link rel="stylesheet" href="estilos.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
</head>
<body>

  <div class="layout">
    <aside class="sidebar">
      <div class="logo-section">
        <div class="logo-icon">
          <img src="logo.png" alt="RHAI Beauty Salon" style="width: 48px; height: 48px; border-radius: 12px;">
        </div>
        <div>
          <h2>BEAUTY LOUNGE</h2>
          <p>Jurerê</p>
        </div>
      </div>

      <nav>
        <a href="#" class="nav-link active" data-section="agendamentos">Agendamentos</a>
        <a href="#" class="nav-link" data-section="clientes">Clientes</a>
        <a href="#" class="nav-link" data-section="profissionais">Profissionais</a>
      </nav>

      <a href="index.html" class="nav-link logout"> Sair</a>
    </aside>

    <main class="main-content">

      <section id="section-agendamentos" class="section active">
        <div class="section-header">
          <h1>Agendamentos</h1>
          <button class="btn-primary" id="btnNovoAgendamento"> Novo</button>
        </div>

        <div class="agenda-layout">
          <div class="calendar-panel">
            <div class="calendar-nav">
              <button id="prevMonth">&lt;</button>
              <span id="mesAno"></span>
              <button id="nextMonth">&gt;</button>
            </div>
            <div class="calendar-weekdays">
              <span>Dom</span><span>Seg</span><span>Ter</span><span>Qua</span><span>Qui</span><span>Sex</span><span>Sáb</span>
            </div>
            <div class="calendar-days" id="calendarDays"></div>
          </div>

          <div class="agenda-list" id="listaAgendamentos">
            <div class="empty-state">
              <p>Selecione uma data para ver os agendamentos</p>
            </div>
          </div>
        </div>
      </section>

      <section id="section-clientes" class="section">
        <div class="section-header">
          <h1>Clientes</h1>
          <button class="btn-primary" id="btnNovoCliente"> Novo Cliente</button>
        </div>

        <div id="clientesGrid" class="clients-grid"></div>

        <div class="table-container">
          <table>
            <thead>
              <tr>
                <th>Nome</th><th>Telefone</th><th>Nascimento</th>
              </tr>
            </thead>
            <tbody id="tabelaClientes">
            </tbody>
          </table>
        </div>
      </section>

      <section id="section-profissionais" class="section">
        <div class="section-header">
          <h1>Profissionais & Serviços</h1>
        </div>
        <div id="profissionaisGrid" class="professionals-grid"></div>
      </section>

    </main>
  </div>

  <div class="modal-overlay" id="modalAgendamento">
    <div class="modal">
      <div class="modal-header">
        <h2>Novo Agendamento</h2>
        <button class="modal-close" id="fecharModalAgendamento">&times;</button>
      </div>
      <form id="formAgendamento">
        <div class="form-group">
          <label>Cliente</label>
          <input type="text" id="agCliente" required>
        </div>
        <div class="form-group">
          <label>Telefone</label>
          <input type="tel" id="agTelefone" required>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Profissional</label>
            <select id="agProfissional"><option value="">Selecione...</option></select>
          </div>
          <div class="form-group">
            <label>Serviço</label>
            <select id="agServico"><option value="">Selecione...</option></select>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Data</label>
            <input type="date" id="agData" required>
          </div>
          <div class="form-group">
            <label>Hora</label>
            <input type="time" id="agHora" required>
          </div>
        </div>
        <div class="form-actions">
          <button type="button" class="btn-secondary" id="cancelarAgendamento">Cancelar</button>
          <button type="submit" class="btn-primary">Agendar</button>
        </div>
      </form>
    </div>
  </div>

  <div class="modal-overlay" id="modalCliente">
    <div class="modal">
      <div class="modal-header">
        <h2>Novo Cliente</h2>
        <button class="modal-close" id="fecharModalCliente">&times;</button>
      </div>
      <form id="formCliente">
        <div class="form-group">
          <label>Nome</label>
          <input type="text" id="clNome" required>
        </div>
        <div class="form-group">
          <label>Telefone</label>
          <input type="tel" id="clTelefone" required>
        </div>
        <div class="form-group">
          <label>Data de Nascimento</label>
          <input type="date" id="clNascimento">
        </div>
        <div class="form-actions">
          <button type="button" class="btn-secondary" id="cancelarCliente">Cancelar</button>
          <button type="submit" class="btn-primary">Cadastrar</button>
        </div>
      </form>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script type="module" src="script.js"></script>
</body>
</html>
