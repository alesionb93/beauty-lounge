<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RHAI Beauty Salon - Sistema</title>
  <meta name="description" content="Sistema de agendamento do salão RHAI Beauty Salon">
  <link rel="stylesheet" href="estilos.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

  <!-- TODO: (código todo acima permanece IGUAL ao seu original, não alterei nada) -->

  <!-- MODAL: Criar/Editar Serviço -->
  <div class="modal-overlay" id="modal-crud-servico">
    <div class="modal modal-small">
      <div class="modal-header">
        <h3 id="modal-crud-servico-titulo">Novo Serviço</h3>
        <button class="modal-close" onclick="closeModal('modal-crud-servico')">&times;</button>
      </div>

      <form onsubmit="salvarServicoCrud(event)">
        <input type="hidden" id="svc-crud-id">

        <div class="form-group">
          <label>Nome do Serviço</label>
          <input type="text" id="svc-crud-nome" required placeholder="Ex: Corte Feminino">
        </div>

        <div class="form-row">
          <div class="form-group">
            <label>Preço (R$)</label>
            <input type="number" id="svc-crud-preco" required step="0.01" min="0" placeholder="150.00">
          </div>
          <div class="form-group">
            <label>Duração (min)</label>
            <input type="number" id="svc-crud-duracao" required min="5" step="5" placeholder="60">
          </div>
        </div>

        <!-- ✅ FIX RESPONSIVO AQUI -->
        <div class="form-group" style="margin-top: 8px;">
          <label style="display: flex; align-items: flex-start; gap: 10px; cursor: pointer;">
            
            <input 
              type="checkbox" 
              id="svc-crud-usa-cores"
              style="margin-top: 4px; flex-shrink: 0;"
            >

            <span style="line-height: 1.4;">
              🎨 Este serviço utiliza sistema de cores
            </span>

          </label>
        </div>

        <div class="modal-actions">
          <button type="button" class="btn-cancel" onclick="closeModal('modal-crud-servico')">Cancelar</button>
          <button type="submit" class="btn-submit">Salvar</button>
        </div>
      </form>
    </div>
  </div>

  <!-- TODO: resto do arquivo permanece exatamente igual -->

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabaseClient.js"></script>
  <script src="script.js"></script>
</body>
</html>
