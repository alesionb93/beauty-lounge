<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RHAI Beauty Salon - Login</title>
  <meta name="description" content="Sistema de agendamento do salão RHAI Beauty Salon">
  <link rel="stylesheet" href="estilos.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="login-wrapper">
    <div class="login-card">
      <img src="logo.png" alt="RHAI Beauty Salon" class="logo-img">
      <h1>BEAUTY LOUNGE</h1>
      <p class="subtitle">Salão de Beleza</p>
      <div class="form-group">
        <input type="email" id="login-email" placeholder="Email" autocomplete="email">
      </div>
      <div class="form-group">
        <input type="password" id="login-pass" placeholder="Senha" autocomplete="current-password">
      </div>
      <button class="btn-login" id="btn-login">Entrar</button>
      <p class="login-error" id="login-error"></p>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabaseClient.js"></script>
  <script>
    // Helper: buscar dados do usuário na tabela 'usuarios' e setar sessionStorage
    async function setSessionFromUser(userId) {
      var resp = await supabaseClient.from('usuarios').select('nome, role').eq('id', userId).single();
      if (resp.data) {
        sessionStorage.setItem('logged', 'true');
        sessionStorage.setItem('userName', resp.data.nome);
        sessionStorage.setItem('userRole', resp.data.role || 'colaborador');
      } else {
        // Fallback caso não encontre na tabela usuarios
        sessionStorage.setItem('logged', 'true');
        sessionStorage.setItem('userName', '');
        sessionStorage.setItem('userRole', 'colaborador');
      }
    }

    // Verificar se já está logado (auto-login)
    (async function() {
      var { data: { session } } = await supabaseClient.auth.getSession();
      if (session) {
        await setSessionFromUser(session.user.id);
        window.location.href = 'agenda.html';
      }
    })();

    document.getElementById('btn-login').addEventListener('click', login);
    document.getElementById('login-pass').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') login();
    });
    document.getElementById('login-email').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') document.getElementById('login-pass').focus();
    });

    async function login() {
      var email = document.getElementById('login-email').value.trim().toLowerCase();
      var password = document.getElementById('login-pass').value;
      var errEl = document.getElementById('login-error');

      if (!email || !password) {
        errEl.textContent = 'Preencha email e senha.';
        errEl.style.display = 'block';
        return;
      }

      errEl.textContent = 'Entrando...';
      errEl.style.display = 'block';
      errEl.style.color = 'var(--text-muted)';

      var { data, error } = await supabaseClient.auth.signInWithPassword({
        email: email,
        password: password
      });

      if (error) {
        errEl.style.color = '#e74c3c';
        errEl.textContent = 'Email ou senha inválidos.';
        setTimeout(function() { errEl.style.display = 'none'; }, 3000);
        return;
      }

      // Login OK — setar sessionStorage e redirecionar
      await setSessionFromUser(data.session.user.id);
      window.location.href = 'agenda.html';
    }
  </script>
</body>
</html>
